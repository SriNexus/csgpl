    <title>CSGPL - ChaitanyaSri Greentech | Premium Solar EPC Solutions India</title>
    <script>
      // Apply theme synchronously to prevent FOUC (flash of wrong theme).
      (function () {
        try {
          var stored = localStorage.getItem("csgpl_theme");
          var theme = stored === "dark" || stored === "light"
            ? stored
            : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) { /* noop */ }
      })();
    </script>
